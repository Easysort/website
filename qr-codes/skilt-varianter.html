<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Metalskilt – varianter</title>
<style>
    :root {
        --green: #16a34a;
        --green-deep: #107038;
        --ink: #0b1f13;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        background: linear-gradient(#bcd3e4 0%, #d7e3ec 60%, #c6cfd6 100%); /* himmel-agtig baggrund */
        padding: 48px 24px 80px;
    }
    .label {
        max-width: 960px;
        margin: 48px auto 14px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #3d4d5c;
    }
    .wrap { max-width: 960px; margin: 0 auto; }

    /* ---------- fælles skilteflade ---------- */
    .sign {
        width: 100%;
        color: #fff;
        background: linear-gradient(172deg, var(--green) 0%, #128a41 70%, var(--green-deep) 100%);
        box-shadow: 0 22px 55px rgba(11, 31, 19, 0.35), inset 0 0 0 3px rgba(255,255,255,0.14);
        border-radius: 14px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .eyebrow {
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        opacity: 0.75;
        margin-bottom: 20px;
    }
    h2 {
        font-size: 97px;
        font-weight: 800;
        line-height: 0.98;
        letter-spacing: -0.005em;
        white-space: nowrap;
        text-shadow: 0 2px 0 rgba(0,0,0,0.08);
    }
    .sub {
        font-size: 30px;
        font-weight: 500;
        line-height: 1.3;
        opacity: 0.96;
        white-space: nowrap;
        margin-top: 20px;
    }
    .sub strong { font-weight: 800; }
    .screw {
        position: absolute;
        width: 15px; height: 15px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #e8f5ec, #57785f);
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }

    /* ---------- variant A: plade med chevroner ---------- */
    .sign-a {
        aspect-ratio: 2 / 1;
        padding: 40px 48px 34px;
    }
    .chevrons { margin-top: 24px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .chevrons svg {
        width: 84px;
        display: block;
        fill: none;
        stroke: #fff;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }
    .chevrons svg:last-child { opacity: 0.45; }

    /* ---------- variant B: skiltet er selv en pil ---------- */
    .sign-b {
        aspect-ratio: 2 / 1;
        padding: 40px 48px 100px;
        border-radius: 0;
        clip-path: polygon(0 0, 100% 0, 100% 76%, 57% 76%, 50% 100%, 43% 76%, 0 76%);
    }
    .sign-b .screw { display: none; }
    .sign-b::after {
        /* hvid kant-effekt langs bunden af pilen */
        content: "";
        position: absolute;
        inset: 0;
        clip-path: inherit;
        box-shadow: inset 0 0 0 4px rgba(255,255,255,0.16);
        pointer-events: none;
    }
</style>
</head>
<body>

<p class="label">A · Grøn plade med chevroner ned mod kameraet</p>
<div class="wrap">
    <div class="sign sign-a">
        <span class="screw" style="top:16px; left:16px;"></span>
        <span class="screw" style="top:16px; right:16px;"></span>
        <span class="screw" style="bottom:16px; left:16px;"></span>
        <span class="screw" style="bottom:16px; right:16px;"></span>
        <p class="eyebrow">Vojens Genbrugsplads</p>
        <h2>SORTERINGSGUIDE</h2>
        <p class="sub">Vis dit affald til kameraet og få svar på <strong>8 sekunder</strong></p>
        <div class="chevrons" aria-hidden="true">
            <svg viewBox="0 0 92 34"><path d="M8 6 46 28 84 6"/></svg>
            <svg viewBox="0 0 92 34"><path d="M8 6 46 28 84 6"/></svg>
        </div>
    </div>
</div>

<p class="label">B · Skiltet er selv pilen (spids bund peger på kameraet)</p>
<div class="wrap">
    <div class="sign sign-b">
        <p class="eyebrow">Vojens Genbrugsplads</p>
        <h2>SORTERINGSGUIDE</h2>
        <p class="sub">Vis dit affald til kameraet og få svar på <strong>8 sekunder</strong></p>
    </div>
</div>

</body>
</html>
