<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>A4 QR-plakat</title>
<style>
    @page { size: A4 portrait; margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 210mm; height: 297mm; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        color: #111827;
    }
    .page {
        width: 210mm;
        height: 297mm;
        padding: 14mm;
    }
    .frame {
        width: 100%;
        height: 100%;
        border: 4mm solid #16a34a;
        border-radius: 10mm;
        padding: 16mm 14mm 12mm;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    h1 {
        font-size: 12mm;
        line-height: 1.2;
        text-transform: uppercase;
        letter-spacing: 0.2mm;
        white-space: nowrap;
    }
    .qr {
        width: 138mm;
        height: 138mm;
        margin: 8mm 0 7mm;
    }
    .how {
        font-size: 8mm;
        line-height: 1.4;
        color: #4b5563;
        max-width: 140mm;
    }
    .url {
        margin-top: 5mm;
        font-size: 7mm;
        font-weight: 600;
        color: #15803d;
    }
    .brand {
        margin-top: auto;
        padding-top: 4mm;
        border-top: 0.5mm solid #e5e7eb;
        width: 100%;
        font-size: 5.5mm;
        font-weight: 600;
        color: #9ca3af;
    }
</style>
</head>
<body>
<div class="page">
    <div class="frame">
        <h1>Tag billede og få<br>hjælp på få sekunder</h1>
        <img class="qr" src="__QR__" alt="QR-kode til sorteringsguiden">
        <p class="how">Scan koden og tag et billede af dit affald, så viser guiden den rigtige container.</p>
        <p class="url">__URL__</p>
        <p class="brand">__BRAND__</p>
    </div>
</div>
</body>
</html>
