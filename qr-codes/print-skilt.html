<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Metalskilt – printfil</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 600px; overflow: hidden; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        background: linear-gradient(172deg, #16a34a 0%, #128a41 70%, #107038 100%);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 50px;
    }
    h1 {
        font-size: 118px;
        font-weight: 800;
        letter-spacing: -0.005em;
        line-height: 1;
        white-space: nowrap;
        margin-bottom: 30px;
    }
    .sub {
        font-size: 44px;
        font-weight: 500;
        white-space: nowrap;
        margin-bottom: 34px;
    }
    .sub strong { font-weight: 800; }
    .chevrons { display: flex; flex-direction: column; align-items: center; gap: 7px; }
    .chevrons svg {
        width: 120px;
        display: block;
        fill: none;
        stroke: #fff;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }
    .chevrons svg:last-child { opacity: 0.45; }
</style>
</head>
<body>
    <h1>SORTERINGSGUIDE</h1>
    <p class="sub">Vis dit affald til kameraet og få svar på <strong>få sekunder</strong></p>
    <div class="chevrons" aria-hidden="true">
        <svg viewBox="0 0 92 34"><path d="M8 6 46 28 84 6"/></svg>
        <svg viewBox="0 0 92 34"><path d="M8 6 46 28 84 6"/></svg>
    </div>
</body>
</html>
